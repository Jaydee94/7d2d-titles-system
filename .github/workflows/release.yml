name: Build and Release

"on":
  push:
    branches:
      - main
    paths:
      - 'TitlesSystem/**'
      - 'libs/**'
      - 'TitlesSystem.Tests/**'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish mod release
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the repository
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up .NET (required to build the C# mod)
      # -----------------------------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # -----------------------------------------------------------------------
      # 3. Restore cached 7DTD server payload
      #    Speeds up release builds by avoiding a full re-download each run.
      # -----------------------------------------------------------------------
      - name: Cache 7DTD server payload
        id: steam-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.7dtd-server
          key: ${{ runner.os }}-steamcmd-7dtd-v1
          restore-keys: |
            ${{ runner.os }}-steamcmd-7dtd-

      # -----------------------------------------------------------------------
      # 4. Install/update SteamCMD and fetch 7DTD dedicated server DLLs
      #    Release artifacts must be built against real game DLLs so the
      #    runtime IModApi type identity matches the server.
      # -----------------------------------------------------------------------
      - name: Install 7DTD Dedicated Server
        run: |
          set -euo pipefail

          mkdir -p "$HOME/steamcmd"
          cd "$HOME/steamcmd"
          curl -fsSL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" -o steamcmd_linux.tar.gz
          tar -xzf steamcmd_linux.tar.gz

          SERVER_ROOT="${{ github.workspace }}/.7dtd-server"
          mkdir -p "$SERVER_ROOT"

          ./steamcmd.sh \
            +@sSteamCmdForcePlatformType windows \
            +force_install_dir "$SERVER_ROOT" \
            +login anonymous \
            +app_info_update 1 \
            +app_update 294420 validate \
            +quit

          HAS_CLIENT_DLL=false
          HAS_SERVER_DLL=false
          [[ -f "$SERVER_ROOT/7DaysToDie_Data/Managed/Assembly-CSharp.dll" ]] && HAS_CLIENT_DLL=true
          [[ -f "$SERVER_ROOT/7DaysToDieServer_Data/Managed/Assembly-CSharp.dll" ]] && HAS_SERVER_DLL=true

          if [[ "$HAS_CLIENT_DLL" == false && "$HAS_SERVER_DLL" == false ]]; then
            echo "ERROR: Assembly-CSharp.dll not found after dedicated server install."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 5. Read the mod version from ModInfo.xml
      # -----------------------------------------------------------------------
      - name: Read mod version
        id: modversion
        run: |
          VERSION=$(grep -oP '(?<=value=")[^"]+' TitlesSystem/ModInfo.xml | sed -n '3p')
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Mod version: ${VERSION}"

      # -----------------------------------------------------------------------
      # 6. Build the mod against real dedicated server DLLs
      # -----------------------------------------------------------------------
      - name: Build TitlesSystem
        run: |
          SERVER_ROOT="${{ github.workspace }}/.7dtd-server"
          dotnet build TitlesSystem/TitlesSystem.csproj \
            -c Release \
            -p:RequireRealGameDlls=true \
            -p:GameRoot="$SERVER_ROOT" \
            -p:OutputPath=bin/Release
        working-directory: ${{ github.workspace }}

      # -----------------------------------------------------------------------
      # 7. Package the mod into a deployable zip
      #    Structure mirrors what goes inside <ServerRoot>/Mods/TitlesSystem/
      # -----------------------------------------------------------------------
      - name: Package mod
        run: |
          MOD_VERSION="${{ steps.modversion.outputs.VERSION }}"
          STAGING="staging/TitlesSystem"

          mkdir -p "${STAGING}/Config"

          cp TitlesSystem/ModInfo.xml                    "${STAGING}/"
          cp TitlesSystem/Config/TitlesRanks.xml         "${STAGING}/Config/"
          cp TitlesSystem/bin/Release/TitlesSystem.dll   "${STAGING}/"

          cd staging
          zip -r "../TitlesSystem-v${MOD_VERSION}.zip" TitlesSystem/
          echo "Created TitlesSystem-v${MOD_VERSION}.zip"
        working-directory: ${{ github.workspace }}

      # -----------------------------------------------------------------------
      # 8. Create (or update) the GitHub Release
      #    Uses the built-in GitHub CLI — no third-party action required.
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MOD_VERSION="${{ steps.modversion.outputs.VERSION }}"
          TAG="v${MOD_VERSION}"
          ASSET="TitlesSystem-v${MOD_VERSION}.zip"

          # Delete the tag and release if they already exist (re-release on re-push)
          gh release delete "${TAG}" --yes 2>/dev/null || true
          git push origin ":refs/tags/${TAG}"    2>/dev/null || true

          gh release create "${TAG}" "${ASSET}" \
            --title "TitlesSystem ${TAG}" \
            --notes "## 7D2D Titles System ${TAG}

          Automated release built from \`main\` — compatible with **7 Days to Die v2.5**.

          ### Installation
          1. Download \`${ASSET}\` and unzip it.
          2. Copy the \`TitlesSystem/\` folder into your server's \`Mods/\` directory.
          3. Restart the server.

          ### What's inside
          \`\`\`
          TitlesSystem/
          ├── ModInfo.xml
          ├── TitlesSystem.dll
          └── Config/
              └── TitlesRanks.xml
          \`\`\`

          See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full configuration and usage."
